# cargo-nextest config (CI-speed Phase 2).
#
# nextest runs each test in its own process and schedules every binary's tests
# in one global pool — far better core utilization than `cargo test`'s
# one-binary-at-a-time. The integration suite points at an EXTERNAL shared
# Postgres (COMIC_TEST_PG_URL) since a per-process container would degenerate to
# per-test under process-per-test; see crates/server/tests/common/mod.rs.

[profile.default]
# Run the whole suite even when something fails (matches the old
# `cargo test --no-fail-fast`).
fail-fast = false
# One automatic retry absorbs the rare container/Docker flake on CI without a
# manual re-run (belt-and-suspenders on top of the #207 de-flake).
retries = 1
# Integration tests are legitimately slow (~40s); warn, and only terminate a
# test that's almost certainly hung (10 min), never a merely-slow one.
slow-timeout = { period = "120s", terminate-after = 5 }

# CI profile: same, plus oversubscription.
[profile.ci]
fail-fast = false
retries = 2
# Report tests that cross 30s in CI so the final nextest summary exposes the
# files/functions dominating wall-clock. Keep the hard-kill window at 10 min
# (30s × 20), matching the old hang tolerance.
slow-timeout = { period = "30s", terminate-after = 20 }
# Oversubscription bound (CI-speed Phase 3, revised 2026-07-02). Was 12,
# but four `Rust — test` runner deaths in one day (the job's agent dying
# ~10-12 min in, step conclusion `null`) pointed at memory/agent pressure:
# 12 test processes + their per-test PG pools + the Postgres/Redis service
# containers + sccache on a 4-vCPU/16 GB runner. The Phase 3 measurements
# showed the suite is CPU-bound on this runner anyway (oversubscription
# past ~2x bought little), so 8 keeps 2x oversubscription while cutting
# peak concurrent memory by a third. Hard ceilings unchanged: Redis has
# 16 logical DBs (per-test isolation via NEXTEST_TEST_GLOBAL_SLOT) and
# Postgres caps at 100 connections (8 x per-test pool of 6 = 48).
test-threads = 8
