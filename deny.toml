# cargo-deny config — runs in CI per §16.1
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
# Each entry below documents (a) which crate the advisory hits, (b)
# how it reaches our graph, (c) why we can accept it for now. Revisit
# on every dep-bump pass.
ignore = [
    # NOTE: stale entries pruned 2026-07-01 (audit DEP-1) — cargo-deny
    # reported these as `advisory-not-detected` (crate no longer in the
    # graph): RUSTSEC-2024-0384 (instant), RUSTSEC-2025-0134
    # (rustls-pemfile), RUSTSEC-2025-0111 (tokio-tar), RUSTSEC-2026-0002
    # (lru 0.12). Re-add if a dep bump reintroduces them.
    #
    # `number_prefix` unmaintained — transitive via indicatif (CLI
    # progress bars in scanner). Cosmetic formatter; no security
    # surface.
    "RUSTSEC-2025-0119",
    # `paste` no longer maintained — proc-macro used at build time by
    # several macro crates. Doesn't ship to runtime. Tracked upstream.
    "RUSTSEC-2024-0436",
    # --- OCR / ML stack (candle → comic-text-detector → imageproc), confined
    # to the optional OCR path; not reachable from the core reader/scanner
    # request paths. (audit DEP-1, 2026-07-01.)
    #
    # `ttf-parser 0.25.1` unmaintained (RUSTSEC-2026-0192) — transitive via
    # `imageproc → ab_glyph → owned_ttf_parser`. Upstream states "no safe
    # upgrade available"; the suggested alternative (`skrifa`) isn't adoptable
    # at our edge. Revisit when comic-text-detector bumps its imageproc pin.
    "RUSTSEC-2026-0192",
    # NOTE: `memmap2 0.9.10` unsound (RUSTSEC-2026-0186, transitive via
    # `candle-core`) is intentionally NOT ignored here — cargo-deny's DB does
    # not match it, so an ignore entry would only warn as
    # `advisory-not-detected`. cargo-audit surfaces it as a non-failing warning
    # (bare `cargo audit` exits 0 on unsound/informational). Revisit when
    # candle bumps its memmap2 pin.
    # `rsa 0.9.10` Marvin Attack timing sidechannel — transitive via
    # `jsonwebtoken`. Folio signs JWTs with Ed25519 (see
    # `secrets::Secrets::jwt_signing`); the `rsa` crate ships in the
    # graph but our code path never exercises RSA primitives.
    # Advisory has "No safe upgrade available" upstream.
    "RUSTSEC-2023-0071",
    # `proc-macro-error2` unmaintained (RUSTSEC-2026-0173) — build-time
    # proc-macro pulled transitively via sea-bae ← sea-orm-macros ←
    # sea-orm. Never ships in the runtime binary; no security surface.
    # Both it and its parent `proc-macro-error` are unmaintained with no
    # drop-in replacement at our edge — clears when sea-orm drops sea-bae.
    "RUSTSEC-2026-0173",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",                  # quoted_printable (lettre transitive); OSI zero-clause BSD
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",   # webpki-roots (rustls cert store); LF permissive
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    # comic-text-detector ships under GPL-3.0-or-later. Folio is
    # AGPL-3.0-or-later; the GPL family is one-way compatible into AGPL
    # (AGPL is GPL + the network-use clause).
    "GPL-3.0-or-later",
    # `libfuzzer-sys` carries the trifecta `(MIT OR Apache-2.0) AND
    # NCSA`. NCSA is the University of Illinois open-source license
    # used by LLVM-adjacent projects; OSI-approved + FSF-free.
    "NCSA",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace path deps (`{ path = "../foo" }`) legitimately omit a
# `version =` constraint; they're internal and resolved by the
# workspace. Without this exemption cargo-deny flags every internal
# crate dependency as a wildcard violation.
allow-wildcard-paths = true
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
