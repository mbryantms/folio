packages:
  - "web"

# pnpm 11 errors (ERR_PNPM_IGNORED_BUILDS) when a dependency's install
# script is skipped without an explicit per-package decision, where
# pnpm 10 only warned. These are optional native build scripts whose
# packages ship prebuilt binaries; main ran with all of them skipped, so
# deny each one here (false = don't run the script) to keep `pnpm install`
# non-interactive in CI while preserving that behavior.
allowBuilds:
  "@parcel/watcher": false
  "@swc/core": false
  esbuild: false
  sharp: false
  unrs-resolver: false
  vue-demi: false

# pnpm 11 stopped reading the `pnpm` field in package.json (incl.
# `pnpm.overrides`); settings now live here. These are security pins —
# keep them in sync with the renovate.json package rules.
# Override-review convention (dependency-pipeline audit 2026-07-02):
# every entry carries the advisory + a delete-when condition. Overrides
# rot — once every dependent's range clears the vulnerable versions,
# DELETE the entry rather than letting renovate bump it forever
# (renovate majors on overrides are disabled in renovate.json).
overrides:
  # GHSA lodash prototype-pollution line; transitive dev/tooling copies.
  # Delete when `pnpm why lodash` shows no in-range <4.18.0 consumers.
  "lodash@<4.18.0": "4.18.1"
  # GHSA js-yaml <4.1.1 code-execution hardening; transitive tooling.
  # Delete when `pnpm why js-yaml` shows no in-range consumers.
  "js-yaml@>=4.0.0 <4.1.1": "5.2.0"
  # GHSA postcss <8.5.10 parsing advisory; build-chain only.
  # Delete when `pnpm why postcss` shows no in-range consumers.
  "postcss@<8.5.10": "8.5.16"
  # GHSA-gv7w-rqvm-qjhr — esbuild <0.28.1 missing binary integrity
  # verification (RCE via NPM_CONFIG_REGISTRY). Reaches us only through
  # the @serwist build toolchain + the vite/vitest dev stack, never the
  # shipped bundle, but the audit gate is severity-based. Holds the
  # transitive copies on the patched line.
  "esbuild@<0.28.1": "0.28.1"
