# Production compose for Folio. Brings up four services:
#
#   app       — Rust axum server (image: folio).         Bound to 127.0.0.1:8080.
#                                                        The single public-facing service.
#   web       — Next.js SSR upstream (image: folio-web). Internal-only on the
#                                                        compose bridge; reached by `app`
#                                                        as its HTML fallback target.
#   postgres  — schema + user data + auth.               Internal-only.
#   redis     — apalis job queue + rate-limit counters.  Internal-only.
#
# Topology (M5 of the rust-public-origin plan): the Rust binary is the
# public origin. Your reverse proxy points at `app:8080` for everything
# — `/api/*`, `/opds/*`, `/auth/*`, page bytes, WebSockets, AND HTML
# pages. Rust handles its own routes directly and reverse-proxies the
# rest to `web:3000` over the compose bridge via the
# `COMIC_WEB_UPSTREAM_URL` env wired below. You no longer need
# path-based routing in your reverse proxy. See
# [`docs/install/caddy.md`](docs/install/caddy.md) for the simplified
# template.
#
# TLS termination is the operator's responsibility (Caddy / nginx /
# Traefik). `app` binds to loopback by default so it's not directly
# reachable from the network; only the reverse proxy (or a tunnel
# daemon running inside the same host, e.g. cloudflared) is. To expose
# the port directly on the host's LAN interface — for a homelab without
# a proxy, or alongside a tunnel — set `COMIC_APP_BIND=0.0.0.0` in
# `.env`. Do **not** set this on a public-internet host; the binary has
# no TLS of its own.
#
# Reverse-proxy templates live under `docs/install/`:
#   - caddy.md   (default; auto Let's Encrypt)
#   - nginx.md
#   - traefik.md
#   - lan-https-mkcert.md   (homelab without a public domain)
#
# Required env (typically via .env file alongside this compose):
#   REPO_OWNER                — GitHub user/org that owns the GHCR image
#   POSTGRES_PASSWORD         — Postgres password for the `comic` user
#   COMIC_LIBRARY_HOST_PATH   — absolute path on the host containing your library
#   COMIC_PUBLIC_URL          — public HTTPS URL (e.g. https://comics.example.com)
# Optional:
#   TAG                       — image tag to pull (default: latest)
#   COMIC_APP_BIND            — host interface for the API port (default: 127.0.0.1)

services:
  # One-shot: makes sure the `comic_data` volume is writable by the
  # distroless nonroot user (UID 65532). On a fresh deploy the named
  # volume is created root-owned, which prevents the server from
  # creating its `secrets/` subdirectory on first boot. Runs to
  # completion in <1s and exits 0; `app.depends_on` ties the boot order.
  app-init:
    image: alpine:3
    restart: "no"
    command:
      - sh
      - -c
      - "mkdir -p /data && chown -R 65532:65532 /data && chmod 0700 /data"
    volumes:
      - comic_data:/data

  app:
    image: ghcr.io/${REPO_OWNER:?REPO_OWNER is required (see .env.example)}/folio:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      app-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      # Internal service names — postgres/redis are on the same compose network.
      COMIC_DATABASE_URL: postgres://comic:${POSTGRES_PASSWORD:?required}@postgres:5432/comic_reader
      COMIC_REDIS_URL: redis://redis:6379
      # SSR fallback upstream. The Rust binary reverse-proxies any path
      # no explicit route handled (HTML pages, `/_next/*` assets, etc.)
      # to Next.js over the compose bridge. `web` is the service name
      # below; the URL is not user-visible.
      COMIC_WEB_UPSTREAM_URL: http://web:3000
      # `COMIC_TRUSTED_PROXIES` lets the rate limiter trust X-Forwarded-For
      # from a reverse proxy on the docker bridge. Without this, every
      # request would appear to come from the gateway IP and the limiter
      # would fail open.
      COMIC_TRUSTED_PROXIES: ${COMIC_TRUSTED_PROXIES:-172.16.0.0/12}
    volumes:
      # Mount the host library at whatever path `COMIC_LIBRARY_PATH`
      # asks the server to scan. Defaults to `/library` (matches the
      # Dockerfile ENV) so a stock install just works without setting
      # either variable. If you want the container path to match the
      # host path (e.g. `/mnt/data` → `/mnt/data` for symmetry between
      # dev and prod), set `COMIC_LIBRARY_PATH=/mnt/data` in `.env` and
      # the mount target follows automatically — no compose edit.
      - ${COMIC_LIBRARY_HOST_PATH:?required}:${COMIC_LIBRARY_PATH:-/library}:ro
      - comic_data:/data
    ports:
      - "${COMIC_APP_BIND:-127.0.0.1}:8080:8080"
    healthcheck:
      test: ["CMD", "/app/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/${REPO_OWNER:?REPO_OWNER is required (see .env.example)}/folio-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      # The API target for Next's `/api/*` rewrite is baked into the web
      # image at *build time* via the Dockerfile's `API_PROXY_URL` ARG
      # (default: `http://app:8080` — this service over the compose
      # bridge). Setting it here at runtime has no effect; rebuild with
      # `--build-arg API_PROXY_URL=…` if you need a different target.
      #
      # `COMIC_API_BASE` IS runtime — it's what RSC pages (`web/lib/api/
      # fetch.ts`) use to call the Rust server during SSR. Must point at
      # the compose-internal service name; the user's browser never sees
      # this URL.
      COMIC_API_BASE: http://app:8080
      NODE_ENV: production
    # `web` is internal-only on the compose bridge — `app` reverse-
    # proxies HTML requests here via `COMIC_WEB_UPSTREAM_URL`. There is
    # no need (and as of M5, no supported configuration) to bind the
    # Next port to the host.
    expose:
      - "3000"
    healthcheck:
      # distroless-nodejs has /nodejs/bin/node on PATH. A tiny inline GET to
      # `/` proves the Next process is serving HTML.
      test:
        - "CMD"
        - "/nodejs/bin/node"
        - "-e"
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: comic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: comic_reader
    volumes:
      - comic_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comic -d comic_reader"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1000", "--appendonly", "yes"]
    volumes:
      - comic_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  comic_data:
  comic_postgres:
  comic_redis:
