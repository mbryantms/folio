# cargo-audit configuration. Mirrors the `ignore` list in `deny.toml`
# so the CI `cargo audit` step (run separately from `cargo deny check`)
# doesn't relitigate the same upstream-stuck advisories. Update both
# files together on every dep-bump pass.

[advisories]
ignore = [
    # `instant` unmaintained (transitive; compile-time clock wrapper).
    "RUSTSEC-2024-0384",
    # `number_prefix` unmaintained (transitive via indicatif).
    "RUSTSEC-2025-0119",
    # `paste` no longer maintained (build-time proc-macro).
    "RUSTSEC-2024-0436",
    # `rustls-pemfile` unmaintained (dev-only via testcontainers).
    "RUSTSEC-2025-0134",
    # `tokio-tar` PAX-header smuggling — dev-only via testcontainers;
    # CVE-2025-62518. Not in the production binary.
    "RUSTSEC-2025-0111",
    # `lru 0.12` IterMut Stacked Borrows soundness; upstream fixed in
    # 0.13+. Tracked as a follow-up dep-bump.
    "RUSTSEC-2026-0002",
    # `rsa 0.9.10` Marvin Attack — transitive via jsonwebtoken; we sign
    # JWTs with Ed25519 only, never call into RSA primitives.
    "RUSTSEC-2023-0071",
    # `memmap2 0.9.10` unsound "unchecked pointer offset"
    # (RUSTSEC-2026-0186) — transitive via candle-core in the optional
    # OCR/ML stack; not reachable from the core reader/scanner request
    # paths (audit DEP-1, 2026-07-01). Needed now that the weekly job
    # runs `cargo audit --deny unsound`. Revisit when candle bumps its
    # memmap2 pin.
    "RUSTSEC-2026-0186",
]
