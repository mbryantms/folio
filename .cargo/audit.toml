# cargo-audit config — the weekly security.yml job runs
# `cargo audit --deny unsound`, so unsound advisories fail unless
# accepted here. Same convention as deny.toml:each entry documents what,
# how it reaches the graph, and why it's acceptable. Revisit on every
# dep-bump pass.

[advisories]
ignore = [
    # `memmap2 0.9.10` unsound "unchecked pointer offset"
    # (RUSTSEC-2026-0186) — transitive via candle-core in the optional
    # OCR/ML stack; not reachable from the core reader/scanner request
    # paths (audit DEP-1, 2026-07-01). Revisit when candle bumps its
    # memmap2 pin.
    "RUSTSEC-2026-0186",
]
