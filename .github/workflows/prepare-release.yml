name: prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version without a leading v, e.g. 0.9.4"
        required: true
        type: string
      previous_tag:
        description: "Previous tag for the changelog compare link; defaults to the latest v* tag"
        required: false
        type: string
      release_date:
        description: "Changelog date; defaults to the workflow run date in UTC"
        required: false
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      PR_TOKEN: ${{ secrets.FOLIO_RELEASE_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Require release PR token
        run: |
          set -euo pipefail
          if [ -z "${PR_TOKEN}" ]; then
            echo "::error::Set a FOLIO_RELEASE_TOKEN secret from a fine-grained PAT or GitHub App token."
            echo "::error::It needs Contents: write and Pull requests: write."
            echo "::error::The default GITHUB_TOKEN-created PR would not trigger required PR checks."
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.FOLIO_RELEASE_TOKEN }}

      - name: Normalize release inputs
        id: release
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "::error::version must look like 1.2.3, got '${{ inputs.version }}'"
            exit 1
          fi

          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::error::tag ${TAG} already exists"
            exit 1
          fi

          PREVIOUS_TAG="${{ inputs.previous_tag }}"
          if [ -z "${PREVIOUS_TAG}" ]; then
            PREVIOUS_TAG="$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n 1)"
          fi
          if [ -z "${PREVIOUS_TAG}" ]; then
            echo "::error::no previous v* tag found; pass previous_tag explicitly"
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/${PREVIOUS_TAG}" >/dev/null; then
            echo "::error::previous tag ${PREVIOUS_TAG} does not exist"
            exit 1
          fi
          if [ "${TAG}" = "${PREVIOUS_TAG}" ]; then
            echo "::error::new tag and previous tag are identical"
            exit 1
          fi

          RELEASE_DATE="${{ inputs.release_date }}"
          if [ -z "${RELEASE_DATE}" ]; then
            RELEASE_DATE="$(date -u +%Y-%m-%d)"
          fi
          if ! date -u -d "${RELEASE_DATE}" +%Y-%m-%d >/dev/null 2>&1; then
            echo "::error::release_date must be YYYY-MM-DD"
            exit 1
          fi

          BRANCH="automation/release-${TAG}"
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "previous_tag=${PREVIOUS_TAG}"
            echo "release_date=${RELEASE_DATE}"
            echo "branch=${BRANCH}"
          } >> "$GITHUB_OUTPUT"

      - name: Stamp changelog
        id: changelog
        run: |
          set -euo pipefail
          python3 scripts/stamp-release-changelog.py \
            "${{ steps.release.outputs.version }}" \
            --date "${{ steps.release.outputs.release_date }}" \
            --previous-tag "${{ steps.release.outputs.previous_tag }}"
          if git diff --quiet -- CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff -- CHANGELOG.md
          fi

      - name: Open changelog PR and enable auto-merge
        id: pr
        if: steps.changelog.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.FOLIO_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "folio-release-bot"
          git config user.email "folio-release-bot@users.noreply.github.com"
          git checkout -B "${{ steps.release.outputs.branch }}"
          git add CHANGELOG.md
          git commit -m "docs: changelog for ${{ steps.release.outputs.tag }}"
          git push --force-with-lease origin "${{ steps.release.outputs.branch }}"

          PR_NUMBER="$(gh pr list \
            --head "${{ steps.release.outputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"
          if [ -z "${PR_NUMBER}" ]; then
            PR_URL="$(gh pr create \
              --base main \
              --head "${{ steps.release.outputs.branch }}" \
              --title "docs: changelog for ${{ steps.release.outputs.tag }}" \
              --body "Automated changelog stamp for ${{ steps.release.outputs.tag }}.")"
            PR_NUMBER="${PR_URL##*/}"
          fi

          gh pr merge "${PR_NUMBER}" --squash --auto --delete-branch
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Wait for changelog PR to merge
        if: steps.changelog.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.FOLIO_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          for attempt in $(seq 1 180); do
            STATE="$(gh pr view "${PR_NUMBER}" --json state --jq '.state')"
            if [ "${STATE}" = "MERGED" ]; then
              exit 0
            fi
            if [ "${STATE}" = "CLOSED" ]; then
              echo "::error::changelog PR #${PR_NUMBER} closed before merging"
              exit 1
            fi
            sleep 30
          done
          echo "::error::timed out waiting for changelog PR #${PR_NUMBER} to merge"
          exit 1

      - name: Refresh main after changelog merge
        run: |
          set -euo pipefail
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main

      - name: Wait for main checks
        env:
          GH_TOKEN: ${{ secrets.FOLIO_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          SHA="$(git rev-parse HEAD)"
          echo "Waiting for checks on main @ ${SHA}"
          CHECK_JQ='.check_runs[]'
          CHECK_JQ+=' | select(.app.slug != "github-actions" or .name != "prepare release / prepare")'
          CHECK_JQ+=' | .name + "=" + .status + "/" + (.conclusion // "pending")'
          FAILURES='/(failure|cancelled|timed_out|action_required|stale)$'
          for attempt in $(seq 1 180); do
            RUNS="$(gh api "repos/${GH_REPO}/commits/${SHA}/check-runs" --paginate \
              --jq "${CHECK_JQ}")"
            if [ -z "${RUNS}" ]; then
              sleep 15
              continue
            fi
            PENDING="$(printf '%s\n' "${RUNS}" | grep -v '=completed/' || true)"
            FAILED="$(printf '%s\n' "${RUNS}" | grep -E "${FAILURES}" || true)"
            if [ -z "${PENDING}" ] && [ -z "${FAILED}" ]; then
              exit 0
            fi
            if [ -n "${FAILED}" ]; then
              echo "::error::main checks failed on ${SHA}"
              printf '%s\n' "${FAILED}"
              exit 1
            fi
            sleep 30
          done
          echo "::error::timed out waiting for main checks"
          exit 1

      - name: Create tag and dispatch release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release.outputs.tag }}"
          SHA="$(git rev-parse HEAD)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" "${SHA}" -m "${TAG}"

          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git" "${TAG}"
          gh workflow run release.yml --ref "${TAG}"

          RUN_ID=""
          for attempt in $(seq 1 30); do
            RUN_ID="$(gh run list \
              --workflow release.yml \
              --branch "${TAG}" \
              --event workflow_dispatch \
              --json databaseId \
              --jq '.[0].databaseId // empty' \
              --limit 5)"
            if [ -n "${RUN_ID}" ]; then
              break
            fi
            sleep 10
          done
          if [ -z "${RUN_ID}" ]; then
            echo "::error::release workflow did not start for ${TAG}"
            exit 1
          fi

          gh run watch "${RUN_ID}" --exit-status
