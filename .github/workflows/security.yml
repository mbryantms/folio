name: Security

on:
  schedule:
    - cron: "23 7 * * 1"  # Monday morning UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2
        with:
          tool: cargo-audit
      # --deny unsound: bare `cargo audit` exits 0 on unsound/informational
      # advisories, so e.g. RUSTSEC-2026-0186 (memmap2) never failed anything.
      # Accepted-risk unsound advisories live in .cargo/audit.toml with the
      # same documented-ignore convention as deny.toml.
      - run: cargo audit --deny unsound
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check advisories

  web-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.10.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm audit --audit-level=high

  # Cross-ecosystem advisory sweep over both lockfiles (Cargo.lock +
  # pnpm-lock.yaml) using the OSV database. Defense-in-depth alongside
  # cargo-audit/cargo-deny (RustSec) and pnpm audit (GitHub advisories);
  # OSV aggregates additional sources and catches transitive npm/cargo
  # advisories the ecosystem-native tools may not yet carry.
  osv-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: google/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=Cargo.lock
            --lockfile=pnpm-lock.yaml
