name: Security

on:
  schedule:
    - cron: "23 7 * * 1"  # Monday morning UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  web-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm audit --audit-level=high

  # Cross-ecosystem advisory sweep over both lockfiles (Cargo.lock +
  # pnpm-lock.yaml) using the OSV database. Defense-in-depth alongside
  # cargo-audit/cargo-deny (RustSec) and pnpm audit (GitHub advisories);
  # OSV aggregates additional sources and catches transitive npm/cargo
  # advisories the ecosystem-native tools may not yet carry.
  osv-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: google/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=Cargo.lock
            --lockfile=pnpm-lock.yaml
