name: Security

on:
  schedule:
    - cron: "23 7 * * 1"  # Monday morning UTC
  workflow_dispatch:

jobs:
  rust-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  web-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  # Cross-ecosystem advisory sweep over both lockfiles (Cargo.lock +
  # pnpm-lock.yaml) using the OSV database. Defense-in-depth alongside
  # cargo-audit/cargo-deny (RustSec) and pnpm audit (GitHub advisories);
  # OSV aggregates additional sources and catches transitive npm/cargo
  # advisories the ecosystem-native tools may not yet carry.
  osv-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: google/osv-scanner-action@v2.0.2
        with:
          scan-args: |-
            --lockfile=Cargo.lock
            --lockfile=pnpm-lock.yaml
