# Publish amd64 images to GHCR for both Folio components. arm64 was dropped
# from the matrix to keep wall-clock under 30 min — re-add `linux/arm64` to
# the `platforms:` lines below if you need it, but build on `ubuntu-24.04-arm`
# rather than under QEMU emulation.
#
# Triggered by:
#   - `git tag v*.*.*`  → immutable + floating tags + GitHub release
#   - push to `main`    → `:edge` + `:sha-<short>`
#   - manual dispatch at a tag → release publish for that tag
#   - manual dispatch at a branch → ad-hoc image build
#
# Images published:
#   ghcr.io/<owner>/folio        (Rust server,    Dockerfile)
#   ghcr.io/<owner>/folio-web    (Next.js front,  web/Dockerfile)
#
# Each published manifest gets an SPDX SBOM attached (anchore/sbom-action)
# and a keyless Sigstore signature (cosign). Self-hosters who care can
#   cosign verify ghcr.io/<owner>/folio:v1.2.3 \
#     --certificate-identity-regexp 'https://github\.com/<owner>/folio/\.github/workflows/release\.yml' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
# to confirm the image came out of this workflow on this repo.

name: release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write       # softprops/action-gh-release writes release notes
  packages: write       # push to ghcr.io
  id-token: write       # cosign keyless OIDC
  attestations: write   # GHA attestations API (SBOM/provenance)

jobs:
  # On a plain push to main we only need to rebuild the floating `:edge` images
  # when code that affects them changed — a docs/CHANGELOG-only merge shouldn't
  # rebuild + push. The paths-filter runs ONLY for branch pushes, so a tag
  # release is never gated on it (publish's `if` short-circuits on the tag ref).
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          filters: |
            code:
              - 'crates/**'
              - 'web/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'Dockerfile'
              - 'web/Dockerfile'
              - '.dockerignore'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/release.yml'

  publish:
    name: ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    needs: [changes]
    # Always build on a tag (the actual release) or a manual dispatch; on a
    # plain push to main, only when image-affecting code changed — skipping the
    # redundant edge rebuild for docs/CHANGELOG-only merges.
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: folio
            dockerfile: Dockerfile
          - image: folio-web
            dockerfile: web/Dockerfile

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so `git describe` works for tags

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            # Semver: vX.Y.Z, vX.Y, vX (each only for tag pushes)
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}}.{{minor}},prefix=v
            type=semver,pattern={{major}},prefix=v
            # main → :edge ; tags → :latest (only for non-prerelease tags)
            type=raw,value=edge,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
            # Always: short SHA for traceability
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Folio${{ matrix.image == 'folio-web' && ' Web' || '' }}
            org.opencontainers.image.description=Self-hostable comic reader (${{ matrix.image == 'folio-web' && 'Next.js frontend' || 'Rust server' }})
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Resolve build-time fingerprints
        id: fingerprint
        # CI bakes the human-readable tag + commit + repo URL into the
        # binary so `/admin/server` renders linkable values even though
        # the .git directory isn't in the Docker context. On tag pushes
        # `ref_name` is the tag itself ("v0.1.8"); on branch / dispatch
        # runs `git describe` is the closest we can get.
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG=$(git describe --tags --always --dirty)
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_full=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"
          echo "repo_url=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The COMIC_BUILD_* args are consumed only by the Rust
          # Dockerfile (folio image); they're harmless on the web image
          # since web/Dockerfile doesn't declare them.
          build-args: |
            COMIC_BUILD_TAG=${{ steps.fingerprint.outputs.tag }}
            COMIC_BUILD_SHA=${{ steps.fingerprint.outputs.sha_short }}
            COMIC_BUILD_SHA_FULL=${{ steps.fingerprint.outputs.sha_full }}
            COMIC_BUILD_REPO_URL=${{ steps.fingerprint.outputs.repo_url }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: false   # we attach SPDX via anchore below; build-push's sbom=true would duplicate

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: ${{ matrix.image }}-sbom.spdx.json
          dependency-snapshot: false

      - name: Install cosign
        # cosign-installer publishes specific tags (v4.1.2) but no floating `v4`
        # major tag, so `@v4` does not resolve — pin the exact version.
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

  release-notes:
    # Runs on tag pushes after both images publish. release-please already
    # created the GitHub Release (with notes generated from CHANGELOG.md), so
    # this job only APPENDS the container-image pull + cosign-verify snippet to
    # that existing release — it never creates or overwrites the body.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Assemble image + verify snippet
        run: |
          set -euo pipefail
          OWNER='${{ github.repository_owner }}'
          REPO='${{ github.repository }}'
          REF="${GITHUB_REF_NAME}"
          {
            echo "### Container images"
            echo "linux/amd64, signed with cosign, SBOM attached:"
            echo '```'
            echo "ghcr.io/${OWNER}/folio:${REF}"
            echo "ghcr.io/${OWNER}/folio-web:${REF}"
            echo '```'
            echo "Verify the signature:"
            echo '```'
            echo "cosign verify ghcr.io/${OWNER}/folio:${REF} \\"
            echo "  --certificate-identity-regexp 'https://github.com/${REPO}/.github/workflows/release.yml' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
            echo '```'
          } > RELEASE_BODY.md
      - name: Append image/verify snippet to the release
        uses: softprops/action-gh-release@v3
        with:
          # release-please already created this release; append, don't replace.
          tag_name: ${{ github.ref_name }}
          append_body: true
          body_path: RELEASE_BODY.md
