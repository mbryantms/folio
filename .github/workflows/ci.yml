name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  # Required for the merge queue: GitHub dispatches a `merge_group` event for
  # each queued entry and waits on these checks against the projected merge
  # result. Without this, queued PRs would hang forever (checks never report).
  merge_group:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PR/merge_group refs, but NEVER on main: a
  # main-push run that gets cancelled doesn't save the rust-cache, which
  # leaves every subsequent PR compiling cold. Let main runs finish so the
  # cache is populated.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Cheap (~5s) path-change detector. Other jobs depend on this instead of
  # the ~1h rust-check, so backend-free PRs (web/docs/lockfile-only) skip the
  # expensive Rust compile + test suite while the required checks still report.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      rust: ${{ steps.filter.outputs.rust || steps.mergequeue.outputs.full }}
      backend_or_spec: ${{ steps.filter.outputs.backend_or_spec || steps.mergequeue.outputs.full }}
      web: ${{ steps.filter.outputs.web || steps.mergequeue.outputs.full }}
      docs: ${{ steps.filter.outputs.docs || steps.mergequeue.outputs.full }}
      docker: ${{ steps.filter.outputs.docker || steps.mergequeue.outputs.full }}
      cargo_deps: ${{ steps.filter.outputs.cargo_deps || steps.mergequeue.outputs.full }}
      web_deps: ${{ steps.filter.outputs.web_deps || steps.mergequeue.outputs.full }}
    steps:
      - uses: actions/checkout@v6
      # In the merge queue we validate the actual merged result, so run the
      # full suite rather than path-skipping. paths-filter also has no PR/push
      # base to diff against on a `merge_group` event. `full=true` flows into
      # both outputs above (empty filter output `|| 'true'` → 'true').
      - id: mergequeue
        if: github.event_name == 'merge_group'
        run: echo "full=true" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'merge_group'
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'
            backend_or_spec:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'web/lib/api/openapi.json'
              - '.github/workflows/ci.yml'
            web:
              - 'web/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs-site/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'
            docker:
              - 'Dockerfile'
              - 'web/Dockerfile'
              - '.dockerignore'
              - '.github/workflows/ci.yml'
            cargo_deps:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/*/Cargo.toml'
              - 'deny.toml'
              - '.github/workflows/ci.yml'
            web_deps:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci.yml'

  rust-fmt:
    name: Rust — fmt
    runs-on: ubuntu-24.04
    needs: [changes]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt
      # fmt is pure-syntax and instant — always run it as a cheap guard.
      - name: cargo fmt
        run: |
          start=$(date +%s)
          cargo fmt --all -- --check
          elapsed=$(($(date +%s) - start))
          {
            echo "### Rust fmt timing"
            echo
            echo "| Step | Duration |"
            echo "| --- | ---: |"
            echo "| cargo fmt | ${elapsed}s |"
          } >> "$GITHUB_STEP_SUMMARY"

  rust-clippy:
    name: Rust — clippy
    runs-on: ubuntu-24.04
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    timeout-minutes: 50
    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: |
          start=$(date +%s)
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          elapsed=$(($(date +%s) - start))
          {
            echo "### Rust clippy timing"
            echo
            echo "| Step | Duration |"
            echo "| --- | ---: |"
            echo "| cargo clippy | ${elapsed}s |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  rust-test:
    name: Rust — test
    runs-on: ubuntu-24.04
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: comic
          POSTGRES_PASSWORD: comic
          POSTGRES_DB: comic_reader_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U comic" --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - name: install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
      # nextest schedules every binary's tests in one global pool (far better
      # core use than cargo test's one-binary-at-a-time) and auto-retries the
      # rare container flake. The integration harness points at the shared
      # Postgres service via COMIC_TEST_PG_URL and clones a template DB per test
      # (see crates/server/tests/common/mod.rs). A separate `cargo test --doc`
      # covers doctests, which nextest doesn't run.
      - name: test
        run: |
          status=0
          {
            echo "### Rust test timings"
            echo
            echo "| Command | Duration | Exit |"
            echo "| --- | ---: | ---: |"
          } >> "$GITHUB_STEP_SUMMARY"

          run_timed() {
            label="$1"
            shift
            start=$(date +%s)
            "$@"
            code=$?
            elapsed=$(($(date +%s) - start))
            echo "| ${label} | ${elapsed}s | ${code} |" >> "$GITHUB_STEP_SUMMARY"
            if [ "$code" -ne 0 ]; then
              status="$code"
            fi
          }

          run_timed "cargo nextest" \
            cargo nextest run --workspace --all-features --profile ci \
              --status-level slow --final-status-level slow
          run_timed "cargo test --doc" \
            cargo test --workspace --all-features --doc
          exit "$status"
        env:
          COMIC_TEST_PG_URL: postgres://comic:comic@localhost:5432/comic_reader_test
          COMIC_DATABASE_URL: postgres://comic:comic@localhost:5432/comic_reader_test
          COMIC_REDIS_URL: redis://localhost:6379
      - name: sccache stats
        if: always()
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  rust-check:
    name: Rust — fmt / clippy / test
    runs-on: ubuntu-24.04
    needs: [changes, rust-fmt, rust-clippy, rust-test]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Verify Rust gates
        run: |
          {
            echo "### Rust gate results"
            echo
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| fmt | ${{ needs.rust-fmt.result }} |"
            echo "| clippy | ${{ needs.rust-clippy.result }} |"
            echo "| test | ${{ needs.rust-test.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          case "${{ needs.rust-fmt.result }}" in
            success) ;;
            *) echo "::error::rust fmt gate did not pass"; exit 1 ;;
          esac
          case "${{ needs.rust-clippy.result }}" in
            success|skipped) ;;
            *) echo "::error::rust clippy gate did not pass"; exit 1 ;;
          esac
          case "${{ needs.rust-test.result }}" in
            success|skipped) ;;
            *) echo "::error::rust test gate did not pass"; exit 1 ;;
          esac

  rust-audit:
    name: Rust — cargo deny / audit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # cargo-deny + cargo-audit inspect the dependency tree, so they only need
    # to run when deps change (Cargo.*, deny.toml). The job still RUNS (required
    # check reports) but skips its steps otherwise. A weekly scheduled sweep
    # (.github/workflows/security-audit.yml) catches newly-disclosed advisories
    # in unchanged deps. `cargo_deps` is true for any merge_group entry.
    needs: [changes]
    env:
      DEPS: ${{ needs.changes.outputs.cargo_deps }}
    steps:
      - uses: actions/checkout@v6
        if: env.DEPS == 'true'
      - uses: dtolnay/rust-toolchain@1.96.0
        if: env.DEPS == 'true'
      - uses: Swatinem/rust-cache@v2
        if: env.DEPS == 'true'
      - uses: EmbarkStudios/cargo-deny-action@v2
        if: env.DEPS == 'true'
        with:
          command: check
      # Prebuilt binary — avoids the ~1min `cargo install cargo-audit` compile.
      - uses: taiki-e/install-action@v2
        if: env.DEPS == 'true'
        with:
          tool: cargo-audit
      - name: cargo audit
        if: env.DEPS == 'true'
        run: cargo audit

  web-check:
    name: Web — lint / typecheck / test
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    # Job always runs (so the required check always reports), but its steps are
    # gated on web changes — a docs/CHANGELOG-only PR skips the ~3min suite and
    # still goes green. `web` is true for any merge_group entry (full run).
    needs: [changes]
    env:
      WEB: ${{ needs.changes.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        if: env.WEB == 'true'
        with:
          version: 11.5.3
      - uses: actions/setup-node@v6
        if: env.WEB == 'true'
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Restore Next.js cache
        if: env.WEB == 'true'
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('web/**/*.ts', 'web/**/*.tsx', 'web/**/*.js', 'web/**/*.jsx', 'web/**/*.mjs', 'web/**/*.css', 'web/**/*.json') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}-
      - name: Start web timing summary
        if: env.WEB == 'true'
        run: |
          {
            echo "### Web timings"
            echo
            echo "| Step | Duration |"
            echo "| --- | ---: |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Install dependencies
        if: env.WEB == 'true'
        run: |
          start=$(date +%s)
          pnpm install --frozen-lockfile --prefer-offline
          elapsed=$(($(date +%s) - start))
          echo "| install | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"
      - name: Lint
        if: env.WEB == 'true'
        run: |
          start=$(date +%s)
          pnpm --filter web run lint
          elapsed=$(($(date +%s) - start))
          echo "| lint | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"
      - name: Typecheck
        if: env.WEB == 'true'
        run: |
          start=$(date +%s)
          pnpm --filter web run typecheck
          elapsed=$(($(date +%s) - start))
          echo "| typecheck | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"
      # Registry gate (audit H1a): query definitions must use the
      # queryKeys registry, never an inline tuple literal.
      - name: Query-key registry gate
        if: env.WEB == 'true'
        run: |
          start=$(date +%s)
          pnpm --filter web run check-query-keys
          elapsed=$(($(date +%s) - start))
          echo "| check-query-keys | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"
      # Status-color contrast gate (audit F1/F2): no bare light-shade
      # status text without a dark: fallback (invisible on light themes).
      - name: Status-color contrast gate
        if: env.WEB == 'true'
        run: |
          start=$(date +%s)
          pnpm --filter web run check-status-colors
          elapsed=$(($(date +%s) - start))
          echo "| check-status-colors | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"
      - name: Unit tests
        if: env.WEB == 'true'
        run: |
          start=$(date +%s)
          pnpm --filter web run test
          elapsed=$(($(date +%s) - start))
          echo "| test | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"
      # Build once so the bundle-budget script reads a real `.next/`
      # output rather than triggering an implicit build itself.
      - name: Build
        if: env.WEB == 'true'
        run: |
          start=$(date +%s)
          pnpm --filter web run build
          elapsed=$(($(date +%s) - start))
          echo "| build | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"
      - name: Reader bundle budget
        if: env.WEB == 'true'
        run: |
          start=$(date +%s)
          pnpm --filter web run check-bundle-size
          elapsed=$(($(date +%s) - start))
          echo "| check-bundle-size | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"
      # Playwright is intentionally not run in CI. The current specs
      # only cover two static-degradation a11y checks (sign-in,
      # forgot-password); the reader-flow walk-through that would
      # justify the ~3-min CI cost is `test.skip`-ed pending a
      # fixture harness (live Rust origin + seeded library). Spec
      # files stay in `web/tests/e2e/` so contributors can still run
      # them locally via `pnpm --filter web run test:e2e`. Restore
      # this step once the harness lands.
      # Blocking as of the 2026-06 dependency audit: docs-site
      # transitive highs were remediated via root `pnpm.overrides`, so
      # the tree is high-clean. A new high-severity advisory now fails
      # CI. Accepted moderates (e.g. the sockjs→uuid dev-server-only
      # advisory) are documented in SECURITY-EXCEPTIONS.md and sit
      # below this `--audit-level=high` gate.
      # Only when deps changed (lockfile/manifest) — code-only web PRs don't
      # alter the dep tree. The weekly security-audit workflow covers advisory
      # drift in unchanged deps.
      - name: pnpm audit
        if: needs.changes.outputs.web_deps == 'true'
        run: |
          start=$(date +%s)
          pnpm audit --audit-level=high
          elapsed=$(($(date +%s) - start))
          echo "| pnpm audit | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"

  docs-build:
    name: Docs site — build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Always runs (required check reports); steps gated on docs-site changes.
    needs: [changes]
    env:
      DOCS: ${{ needs.changes.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        if: env.DOCS == 'true'
        with:
          version: 11.5.3
      - uses: actions/setup-node@v6
        if: env.DOCS == 'true'
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        if: env.DOCS == 'true'
        run: |
          start=$(date +%s)
          pnpm install --frozen-lockfile --prefer-offline
          elapsed=$(($(date +%s) - start))
          {
            echo "### Docs timings"
            echo
            echo "| Step | Duration |"
            echo "| --- | ---: |"
            echo "| install | ${elapsed}s |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Build docs
        if: env.DOCS == 'true'
        run: |
          start=$(date +%s)
          pnpm --filter docs-site run build
          elapsed=$(($(date +%s) - start))
          echo "| build | ${elapsed}s |" >> "$GITHUB_STEP_SUMMARY"

  openapi-drift:
    name: OpenAPI — snapshot + breaking-change check
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    # Decoupled from rust-check (it builds its own spec); depends only on the
    # ~5s `changes` job so drift feedback isn't queued behind the test suite.
    needs: [changes]
    env:
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # The Rust build (to emit the spec) only matters when backend or the
      # checked-in spec changed; the spec can't have drifted otherwise.
      - uses: dtolnay/rust-toolchain@1.96.0
        if: needs.changes.outputs.backend_or_spec == 'true'
      - uses: mozilla-actions/sccache-action@v0.0.10
        if: needs.changes.outputs.backend_or_spec == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.backend_or_spec == 'true'
      - name: Generate spec from PR
        if: needs.changes.outputs.backend_or_spec == 'true'
        # Debug build — the emitted spec is identical to release, and a debug
        # build is far faster on every backend PR.
        run: |
          start=$(date +%s)
          cargo run --bin server -- --emit-openapi > /tmp/pr-openapi.json
          elapsed=$(($(date +%s) - start))
          {
            echo "### OpenAPI timings"
            echo
            echo "| Step | Duration |"
            echo "| --- | ---: |"
            echo "| generate spec | ${elapsed}s |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Snapshot match
        if: needs.changes.outputs.backend_or_spec == 'true'
        run: |
          if [ -f web/lib/api/openapi.json ]; then
            diff -q /tmp/pr-openapi.json web/lib/api/openapi.json || \
              (echo "::error::OpenAPI spec drifted from web/lib/api/openapi.json. Run 'just openapi'." && exit 1)
          fi
      # Audit-remediation M10.1 spec-drift gate: regen the generated
      # types and fail if they disagree with the checked-in copy.
      # Catches the case where a contributor commits openapi.json
      # but forgets to run `pnpm openapi:gen`. Node-only + fast, so it
      # always runs (also catches a hand-edited openapi.json / types file).
      - name: Generated TS types match
        run: |
          start=$(date +%s)
          pnpm install --frozen-lockfile --prefer-offline
          # openapi-typescript is a dependency of the `web` workspace package,
          # not the repo root, so it must be exec'd in the web context — a bare
          # `pnpm exec` from the root fails with ERR_PNPM_RECURSIVE_EXEC_FIRST_FAIL.
          # (Don't swallow stderr: a silent crash here used to produce an empty
          # output file and a misleading "types are stale" failure.)
          pnpm --filter web exec openapi-typescript lib/api/openapi.json -o /tmp/pr-types.generated.ts
          diff -q /tmp/pr-types.generated.ts web/lib/api/types.generated.ts || \
            (echo "::error::web/lib/api/types.generated.ts is stale. Run 'just openapi'." && exit 1)
          elapsed=$(($(date +%s) - start))
          {
            echo "### OpenAPI timings"
            echo
            echo "| Step | Duration |"
            echo "| --- | ---: |"
            echo "| generated TS types | ${elapsed}s |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: oasdiff vs main
        if: github.event_name == 'pull_request' && needs.changes.outputs.backend_or_spec == 'true'
        run: |
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF"
          # Surface real git errors (don't swallow stderr); the || branch still
          # handles the expected "no baseline spec on this ref" case.
          git checkout "origin/$BASE_REF" -- web/lib/api/openapi.json || \
            (echo "no baseline spec on $BASE_REF; skipping oasdiff" && exit 0)
          curl -fsSL https://raw.githubusercontent.com/Tufin/oasdiff/main/install.sh | sh
          # The installer drops the binary in /usr/local/bin (on PATH); invoke
          # it by name, not `./oasdiff` (the old install-to-cwd behavior).
          oasdiff breaking web/lib/api/openapi.json /tmp/pr-openapi.json || \
            ([[ "${{ contains(github.event.pull_request.labels.*.name, 'breaking-change') }}" == "true" ]] && \
              echo "::warning::Breaking changes detected (acknowledged via label)" || \
              (echo "::error::Breaking API changes — add 'breaking-change' label and update CHANGELOG.md" && exit 1))
      - name: sccache stats
        if: always() && needs.changes.outputs.backend_or_spec == 'true'
        run: ${SCCACHE_PATH:-sccache} --show-stats || true

  audit-check:
    name: Rust — audit-log enforcement (M10.2)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Decoupled from rust-check; gated on Rust changes (a handler audit only
    # matters when crates/** changed). Job still reports success when skipped.
    needs: [changes]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96.0
        if: needs.changes.outputs.rust == 'true'
      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.rust == 'true'
      # AST-walks every handler under crates/server/src/api/ and
      # fails if any RequireAdmin-gated function returns success
      # without calling `record_admin_action!` (or its `audit::record`
      # equivalent). Exemptions in crates/tools/audit-check/allowlist.txt
      # cover read-only admin GETs + delegate-pattern wrappers.
      - name: audit-log enforcement
        if: needs.changes.outputs.rust == 'true'
        run: |
          start=$(date +%s)
          cargo run -p audit-check
          elapsed=$(($(date +%s) - start))
          {
            echo "### Audit-log enforcement timing"
            echo
            echo "| Step | Duration |"
            echo "| --- | ---: |"
            echo "| cargo run -p audit-check | ${elapsed}s |"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-build:
    name: Docker — amd64 build
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    # Intentionally gated on the full check jobs — don't burn an image build
    # if fmt/clippy/test or the web suite failed. Build steps additionally skip
    # when neither image's inputs changed (e.g. a docs/CHANGELOG-only PR): the
    # job still runs so the required check reports, it just does nothing.
    needs: [changes, rust-check, web-check]
    env:
      # Per-image: the server image rebuilds on Rust changes, the web image on
      # web changes; either rebuilds on a Dockerfile change. `docker` is true
      # for any merge_group entry (full run).
      BUILD: ${{ (matrix.image == 'folio' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.docker == 'true')) || (matrix.image == 'folio-web' && (needs.changes.outputs.web == 'true' || needs.changes.outputs.docker == 'true')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: folio
            dockerfile: Dockerfile
          - image: folio-web
            dockerfile: web/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
        if: env.BUILD == 'true'
      - name: Build (no push)
        if: env.BUILD == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
